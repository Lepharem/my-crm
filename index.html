<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營運管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f7f6f3;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#6b6a64;--text3:#9b9a94;
  --border:#e0ddd4;--border2:#c8c6bc;
  --teal:#0f6e56;--teal-bg:#e1f5ee;--teal-text:#085041;
  --blue-bg:#e6f1fb;--blue-text:#0c447c;
  --amber-bg:#faeeda;--amber-text:#633806;
  --gray-bg:#f1efe8;--gray-text:#444441;
  --red-bg:#fcebeb;--red-text:#791f1f;--red-border:#f0abab;
  --green-bg:#eaf3de;--green-text:#27500a;
  --purple-bg:#eeedfe;--purple-text:#3c3489;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
  --text:#e8e6df;--text2:#9b9a94;--text3:#6b6a64;
  --border:#3a3935;--border2:#4a4943;
  --teal:#1d9e75;--teal-bg:#085041;--teal-text:#9fe1cb;
  --blue-bg:#0c447c;--blue-text:#b5d4f4;
  --amber-bg:#633806;--amber-text:#fac775;
  --gray-bg:#3a3935;--gray-text:#d3d1c7;
  --red-bg:#501313;--red-text:#f7c1c1;--red-border:#7a3333;
  --green-bg:#173404;--green-text:#c0dd97;
  --purple-bg:#3c3489;--purple-text:#cecbf6;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.app{max-width:980px;margin:0 auto;padding:24px 16px}
nav{display:flex;gap:4px;margin-bottom:28px;border-bottom:0.5px solid var(--border);padding-bottom:0}
.nav-btn{padding:10px 18px;border:none;background:none;color:var(--text2);font-size:14px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:.15s}
.nav-btn:hover{color:var(--text)}
.nav-btn.on{color:var(--teal);border-bottom-color:var(--teal);font-weight:500}
.page{display:none}.page.on{display:block}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.page-title{font-size:18px;font-weight:600}
.saved{font-size:12px;color:var(--text3)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:22px}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-l{font-size:12px;color:var(--text2);margin-bottom:3px}
.stat-n{font-size:22px;font-weight:600}
.good{color:#0f6e56}.warn{color:#854f0b}.danger{color:#a32d2d}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:180px;position:relative}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.sw input{width:100%;padding:9px 12px 9px 34px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;outline:none}
.sw input:focus{border-color:var(--teal)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:6px 13px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);font-size:13px;cursor:pointer;transition:.15s}
.pill:hover{background:var(--bg2)}
.pill.on{background:var(--teal-bg);border-color:var(--teal);color:var(--teal-text);font-weight:500}
.btn-add{padding:9px 18px;border-radius:var(--r);border:0.5px solid var(--teal);background:var(--teal-bg);color:var(--teal-text);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.clients{display:flex;flex-direction:column;gap:10px}
.cc{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:border-color .15s}
.cc:hover{border-color:var(--border2)}
.cc.open{border-color:var(--teal);border-width:1px}
.cc-header{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.ci{flex:1;min-width:0}
.cn{font-size:15px;font-weight:500}
.cm{font-size:12px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cc-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pcount{font-size:12px;color:var(--text3);background:var(--bg2);padding:3px 9px;border-radius:12px;border:0.5px solid var(--border)}
.chevron{width:16px;height:16px;opacity:.4;transition:transform .2s;flex-shrink:0}
.cc.open .chevron{transform:rotate(180deg)}
.cc-detail{display:none;border-top:0.5px solid var(--border);padding:16px}
.cc.open .cc-detail{display:block}
.dgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px 20px;margin-bottom:16px}
.dl{font-size:11px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.dv{font-size:13px;font-weight:500;word-break:break-all}
.row-btns{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.btn-sm{padding:6px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);font-size:12px;cursor:pointer;transition:.15s}
.btn-sm:hover{background:var(--bg2)}
.btn-del{color:var(--red-text);border-color:var(--red-border)}
.btn-del:hover{background:var(--red-bg)}
.proj-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.proj-label{font-size:13px;font-weight:500;color:var(--text2)}
.btn-addsm{padding:5px 12px;border-radius:var(--r);border:0.5px solid var(--teal);background:var(--teal-bg);color:var(--teal-text);font-size:12px;cursor:pointer}
.plist{display:flex;flex-direction:column;gap:8px}
.pempty{font-size:13px;color:var(--text3);padding:12px 0;text-align:center}
.pc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:13px 15px}
.pc-row{display:flex;align-items:center;gap:10px;cursor:pointer}
.pc-info{flex:1;min-width:0}
.pn{font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pm{font-size:12px;color:var(--text2);margin-top:2px}
.badge{font-size:11px;padding:3px 9px;border-radius:12px;white-space:nowrap;flex-shrink:0}
.b-proposal{background:var(--blue-bg);color:var(--blue-text)}
.b-active{background:var(--teal-bg);color:var(--teal-text)}
.b-closed{background:var(--gray-bg);color:var(--gray-text)}
.b-paid{background:var(--green-bg);color:var(--green-text)}
.b-unpaid{background:var(--amber-bg);color:var(--amber-text)}
.b-overdue{background:var(--red-bg);color:var(--red-text)}
.b-invoiced{background:var(--purple-bg);color:var(--purple-text)}
.pexpand{display:none;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)}
.pexpand.open{display:block}
.pgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px 16px;margin-bottom:12px}
.pact{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.drive-link{font-size:12px;color:var(--teal);text-decoration:none;word-break:break-all}
.drive-link:hover{text-decoration:underline}
/* Payments */
.pay-sec{margin-top:14px;padding-top:14px;border-top:0.5px solid var(--border)}
.pay-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pay-label{font-size:12px;font-weight:500;color:var(--text2)}
.pay-list{display:flex;flex-direction:column;gap:6px}
.pay-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:11px 13px}
.pay-top{display:flex;align-items:center;gap:8px}
.pay-info{flex:1;min-width:0}
.pay-name{font-size:13px;font-weight:500}
.pay-meta{font-size:11px;color:var(--text2);margin-top:2px}
.pay-right{display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
.pay-amt{font-size:14px;font-weight:600;white-space:nowrap}
.btn-xs{padding:4px 9px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text2);font-size:11px;cursor:pointer;white-space:nowrap}
.btn-xs:hover{background:var(--border)}
/* Invoice sub-row */
.inv-row{margin-top:8px;padding:8px 10px;background:var(--bg2);border-radius:var(--r);border:0.5px solid var(--border);font-size:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.inv-label{color:var(--text3);font-size:11px;min-width:48px}
.inv-val{font-weight:500;color:var(--text)}
.inv-add{font-size:11px;color:var(--teal);cursor:pointer;text-decoration:underline;margin-left:auto}
/* Finance page */
.fin-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.month-nav{display:flex;align-items:center;gap:6px}
.month-nav button{padding:6px 10px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);font-size:13px;cursor:pointer}
.month-nav button:hover{background:var(--bg2)}
.month-label{font-size:15px;font-weight:500;min-width:80px;text-align:center}
.fin-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.fin-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);padding:18px 20px}
.fin-card-l{font-size:12px;color:var(--text2);margin-bottom:6px}
.fin-card-n{font-size:26px;font-weight:600}
.fin-card-s{font-size:12px;color:var(--text3);margin-top:4px}
.sec-title{font-size:15px;font-weight:500;margin-bottom:12px}
.table-wrap{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;margin-bottom:24px}
.ptable{width:100%;border-collapse:collapse;font-size:13px}
.ptable th{text-align:left;padding:10px 13px;font-size:11px;font-weight:500;color:var(--text2);border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:.04em}
.ptable td{padding:11px 13px;border-bottom:0.5px solid var(--border);vertical-align:middle}
.ptable tr:last-child td{border-bottom:none}
.ptable tr:hover td{background:var(--bg2)}
.status-select{padding:4px 8px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg2);color:var(--text);font-size:12px;cursor:pointer;outline:none}
/* Modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:18px}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus{border-color:var(--teal)}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.btn-cancel{padding:9px 18px;border-radius:var(--r);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer}
.btn-save{padding:9px 18px;border-radius:var(--r);border:0.5px solid var(--teal);background:var(--teal-bg);color:var(--teal-text);font-size:13px;font-weight:500;cursor:pointer}
.divider{font-size:12px;font-weight:500;color:var(--text3);margin:16px 0 12px;padding-bottom:6px;border-bottom:0.5px solid var(--border)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty-state{text-align:center;padding:40px;color:var(--text3);font-size:13px}
@media(max-width:520px){.fgr{grid-template-columns:1fr}.dgrid{grid-template-columns:1fr 1fr}.pgrid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
  <nav>
    <button class="nav-btn on" onclick="showPage('crm',this)">客戶管理</button>
    <button class="nav-btn" onclick="showPage('finance',this)">財務總覽</button>
  </nav>

  <!-- CRM -->
  <div class="page on" id="page-crm">
    <div class="page-header">
      <div class="page-title">客戶管理</div>
      <div class="saved" id="saved">資料儲存於本機瀏覽器</div>
    </div>
    <div class="stats" id="crm-stats"></div>
    <div class="toolbar">
      <div class="sw">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M10 10l3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        <input type="text" id="search" placeholder="搜尋公司名稱、統編、電話…" oninput="renderCRM()">
      </div>
      <div class="filters">
        <button class="pill on" data-f="all" onclick="setCRMFilter(this)">全部</button>
        <button class="pill" data-f="active" onclick="setCRMFilter(this)">進行中</button>
        <button class="pill" data-f="proposal" onclick="setCRMFilter(this)">提案中</button>
      </div>
      <button class="btn-add" onclick="openClientModal()">+ 新增客戶</button>
    </div>
    <div class="clients" id="clients"></div>
  </div>

  <!-- Finance -->
  <div class="page" id="page-finance">
    <div class="page-header">
      <div class="page-title">財務總覽</div>
    </div>
    <div class="fin-bar">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">&#8249;</button>
        <span class="month-label" id="month-label"></span>
        <button onclick="changeMonth(1)">&#8250;</button>
      </div>
      <div class="filters">
        <button class="pill on" data-fp="all" onclick="setFinFilter(this)">全部月份</button>
        <button class="pill" data-fp="month" onclick="setFinFilter(this)">本月</button>
      </div>
      <div class="filters" style="margin-left:auto">
        <button class="pill on" data-fs="all" onclick="setStatusFilter(this)">全部狀態</button>
        <button class="pill" data-fs="unpaid" onclick="setStatusFilter(this)">未付款</button>
        <button class="pill" data-fs="overdue" onclick="setStatusFilter(this)">逾期</button>
        <button class="pill" data-fs="paid" onclick="setStatusFilter(this)">已收款</button>
      </div>
    </div>
    <div class="fin-grid" id="fin-cards"></div>
    <div class="sec-title" id="fin-table-title">請款明細</div>
    <div class="table-wrap">
      <table class="ptable">
        <thead><tr>
          <th>客戶</th><th>專案</th><th>請款項目</th><th>金額</th><th>請款日</th><th>到期日</th><th>狀態</th><th>發票</th><th></th>
        </tr></thead>
        <tbody id="fin-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Client Modal -->
<div class="overlay" id="cm-ov" onclick="oc(event,'cm-ov')">
  <div class="modal">
    <h2 id="cm-title">新增客戶</h2>
    <div class="fg"><label>公司名稱 *</label><input id="cm-name" placeholder="例：台北數位科技有限公司"></div>
    <div class="fgr">
      <div class="fg"><label>統一編號</label><input id="cm-taxid" placeholder="12345678"></div>
      <div class="fg"><label>電話</label><input id="cm-phone" placeholder="02-xxxx-xxxx"></div>
    </div>
    <div class="fg"><label>地址</label><input id="cm-addr" placeholder="台北市…"></div>
    <div class="fgr">
      <div class="fg"><label>預算規模（NT$）</label><input id="cm-budget" placeholder="500,000"></div>
      <div class="fg"><label>報價單編號</label><input id="cm-quote" placeholder="Q2025-001"></div>
    </div>
    <div class="fg"><label>聯絡人</label><input id="cm-contact" placeholder="姓名・職稱"></div>
    <div class="fg"><label>Email</label><input id="cm-email" type="email"></div>
    <div class="fg"><label>備註</label><textarea id="cm-note" rows="2"></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cm('cm-ov')">取消</button>
      <button class="btn-save" onclick="saveClient()">儲存</button>
    </div>
  </div>
</div>

<!-- Project Modal -->
<div class="overlay" id="pm-ov" onclick="oc(event,'pm-ov')">
  <div class="modal">
    <h2 id="pm-title">新增專案</h2>
    <div class="fg"><label>專案名稱 *</label><input id="pm-name" placeholder="例：2025 品牌社群年約"></div>
    <div class="fgr">
      <div class="fg"><label>狀態</label><select id="pm-status"><option value="proposal">提案中</option><option value="active">進行中</option><option value="closed">結案</option></select></div>
      <div class="fg"><label>負責人員</label><input id="pm-owner"></div>
    </div>
    <div class="fgr">
      <div class="fg"><label>合約金額（NT$）</label><input id="pm-amount"></div>
      <div class="fg"><label>報價單編號</label><input id="pm-quote"></div>
    </div>
    <div class="fgr">
      <div class="fg"><label>開始日期</label><input id="pm-start" type="date"></div>
      <div class="fg"><label>結束日期</label><input id="pm-end" type="date"></div>
    </div>
    <div class="fg"><label>Google Drive 連結</label><input id="pm-drive" placeholder="https://drive.google.com/…"></div>
    <div class="fg"><label>備註</label><textarea id="pm-note" rows="2"></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cm('pm-ov')">取消</button>
      <button class="btn-save" onclick="saveProject()">儲存</button>
    </div>
  </div>
</div>

<!-- Payment + Invoice Modal -->
<div class="overlay" id="pay-ov" onclick="oc(event,'pay-ov')">
  <div class="modal">
    <h2 id="pay-title">新增請款記錄</h2>
    <div class="fg"><label>請款項目名稱 *</label><input id="pay-name" placeholder="例：頭款 50%、1月月費…"></div>
    <div class="fgr">
      <div class="fg"><label>請款金額（NT$）*</label><input id="pay-amount" placeholder="60,000"></div>
      <div class="fg"><label>狀態</label>
        <select id="pay-status">
          <option value="unpaid">未付款</option>
          <option value="paid">已收款</option>
          <option value="overdue">逾期</option>
        </select>
      </div>
    </div>
    <div class="fgr">
      <div class="fg"><label>請款日期</label><input id="pay-date" type="date"></div>
      <div class="fg"><label>付款到期日</label><input id="pay-due" type="date"></div>
    </div>
    <div class="fg"><label>備註</label><input id="pay-note" placeholder="付款方式、備注…"></div>
    <div class="divider">發票資訊（選填）</div>
    <div class="fgr">
      <div class="fg"><label>發票號碼</label><input id="inv-number" placeholder="AB-12345678"></div>
      <div class="fg"><label>發票類型</label>
        <select id="inv-type">
          <option value="">— 未開立 —</option>
          <option value="二聯式">二聯式統一發票</option>
          <option value="三聯式">三聯式統一發票</option>
        </select>
      </div>
    </div>
    <div class="fgr">
      <div class="fg"><label>發票開立日期</label><input id="inv-date" type="date"></div>
      <div class="fg"><label>含稅金額（NT$）</label><input id="inv-amount" placeholder="自動含稅 5%"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="cm('pay-ov')">取消</button>
      <button class="btn-save" onclick="savePayment()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script>
const COLORS=[{bg:'#e1f5ee',c:'#085041'},{bg:'#e6f1fb',c:'#0c447c'},{bg:'#faeeda',c:'#633806'},{bg:'#eeedfe',c:'#3c3489'},{bg:'#faece7',c:'#712b13'},{bg:'#eaf3de',c:'#27500a'}];
const PSL={proposal:'提案中',active:'進行中',closed:'結案'};
const PSC={proposal:'b-proposal',active:'b-active',closed:'b-closed'};
const PYSL={unpaid:'未付款',paid:'已收款',overdue:'逾期'};

function save(){
  localStorage.setItem('cms_v4',JSON.stringify(D));
  const now=new Date();
  const el=document.getElementById('saved');
  if(el)el.textContent='上次儲存 '+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
}
function nxt(a){return a.length?Math.max(...a.map(x=>x.id))+1:1}
function ini(n){const p=n.trim().split(/\s+/);return p.length>=2?p[0][0]+p[1][0]:n.slice(0,2)}
function col(id){return COLORS[id%COLORS.length]}
function fm(s){return s?'NT$ '+s:'—'}
function pn(s){return parseInt((s||'0').replace(/,/g,''))||0}
function allPays(){return D.clients.flatMap(c=>c.projects.flatMap(p=>p.payments.map(py=>({...py,cname:c.name,cid:c.id,pname:p.name,pid:p.id}))))}

function showPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+id).classList.add('on');el.classList.add('on');
  if(id==='finance')renderFinance();
}

/* CRM */

  const prop=ap.filter(p=>p.status==='proposal').length;
  document.getElementById('crm-stats').innerHTML=`
    <div class="stat"><div class="stat-l">客戶總數</div><div class="stat-n">${total}</div></div>
    <div class="stat"><div class="stat-l">專案總數</div><div class="stat-n">${ap.length}</div></div>
    <div class="stat"><div class="stat-l">進行中</div><div class="stat-n good">${act}</div></div>
    <div class="stat"><div class="stat-l">提案中</div><div class="stat-n warn">${prop}</div></div>`;
  const q=document.getElementById('search').value.toLowerCase();
  const list=D.clients.filter(c=>{
    const mq=!q||[c.name,c.taxid,c.phone,c.contact,c.email].join(' ').toLowerCase().includes(q);
    const mf=crmF==='all'||(crmF==='active'&&c.projects.some(p=>p.status==='active'))||(crmF==='proposal'&&c.projects.some(p=>p.status==='proposal'));

  el.innerHTML=list.map(c=>{
    const cl=col(c.id);const isOpen=openCid===c.id;
    const ac=c.projects.filter(p=>p.status==='active').length;
    return`<div class="cc${isOpen?' open':''}" id="cc-${c.id}">
      <div class="cc-header" onclick="toggleC(${c.id})">
        <div class="av" style="background:${cl.bg};color:${cl.c}">${ini(c.name)}</div>
        <div class="ci"><div class="cn">${c.name}</div><div class="cm">${c.taxid?'統編 '+c.taxid+'・':''}${c.phone||''}${c.contact?'・'+c.contact:''}</div></div>
        <div class="cc-right"><span class="pcount">${c.projects.length} 個專案${ac?' · '+ac+' 進行中':''}</span>

          <div><div class="dl">報價單編號</div><div class="dv">${c.quote||'—'}</div></div>
          <div><div class="dl">備註</div><div class="dv">${c.note||'—'}</div></div>
        </div>
        <div class="row-btns">
          <button class="btn-sm" onclick="openEditC(${c.id})">編輯客戶資料</button>

    </div>
    <div class="pexpand${isOpen?' open':''}">
      <div class="pgrid">
        <div><div class="dl">負責人員</div><div class="dv">${p.owner||'—'}</div></div>
        <div><div class="dl">合約金額</div><div class="dv">${fm(p.amount)}</div></div>
        <div><div class="dl">報價單編號</div><div class="dv">${p.quote||'—'}</div></div>
        <div><div class="dl">開始日期</div><div class="dv">${p.start||'—'}</div></div>
        <div><div class="dl">結束日期</div><div class="dv">${p.end||'—'}</div></div>
        <div><div class="dl">狀態</div><div class="dv">${PSL[p.status]}</div></div>

      ${p.note?`<div style="margin-bottom:10px"><div class="dl" style="margin-bottom:3px">備註</div><div class="dv" style="font-weight:400;font-size:13px">${p.note}</div></div>`:''}
      <div class="pact">
        <button class="btn-sm" onclick="openEditP(${cid},${p.id})">編輯專案</button>
        <button class="btn-sm btn-del" onclick="delP(${cid},${p.id})">刪除專案</button>
      </div>

        <div class="pay-hdr"><span class="pay-label">請款記錄（${p.payments.length}）</span><button class="btn-xs" onclick="openAddPay(${cid},${p.id})">+ 新增請款</button></div>

      </div>
    </div>
  </div>`;
}

function updatePayStatus(cid,pid,pyid,val){
  const c=D.clients.find(x=>x.id===cid);
  const p=c.projects.find(x=>x.id===pid);
  const py=p.payments.find(x=>x.id===pyid);
  if(py){py.status=val;}
  save();renderCRM();toast('狀態已更新');
}

function toggleC(id){openCid=openCid===id?null:id;renderCRM()}
function toggleP(cid,pid){const k=cid+'_'+pid;openPids[k]=!openPids[k];renderCRM()}
function setCRMFilter(el){crmF=el.dataset.f;document.querySelectorAll('#page-crm .pill').forEach(p=>p.classList.remove('on'));el.classList.add('on');renderCRM()}

/* Finance */
function changeMonth(d){
  const [y,m]=finMonth.split('-').map(Number);
  const nd=new Date(y,m-1+d,1);
  finMonth=nd.getFullYear()+'-'+String(nd.getMonth()+1).padStart(2,'0');
  renderFinance();
}

function renderFinance(){
  const [y,m]=finMonth.split('-').map(Number);
  const mn=['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('month-label').textContent=y+'年 '+mn[m-1];
  const all=allPays();
  const monthPays=all.filter(py=>py.date&&py.date.slice(0,7)===finMonth);
  const srcPays=finF==='month'?monthPays:all;
  const shown=statusF==='all'?srcPays:srcPays.filter(py=>py.status===statusF);
  const title=finF==='month'?`${y}年${mn[m-1]}請款明細`:'全部請款明細';
  document.getElementById('fin-table-title').textContent=title;
  const totalUnpaid=all.filter(p=>p.status==='unpaid').reduce((s,p)=>s+pn(p.amount),0);
  const totalOverdue=all.filter(p=>p.status==='overdue').reduce((s,p)=>s+pn(p.amount),0);
  const monthPaid=monthPays.filter(p=>p.status==='paid').reduce((s,p)=>s+pn(p.amount),0);
  const monthTotal=monthPays.reduce((s,p)=>s+pn(p.amount),0);
  document.getElementById('fin-cards').innerHTML=`
    <div class="fin-card"><div class="fin-card-l">應收未收（全部）</div><div class="fin-card-n warn">NT$ ${totalUnpaid.toLocaleString()}</div><div class="fin-card-s">${all.filter(p=>p.status==='unpaid').length} 筆</div></div>
    <div class="fin-card"><div class="fin-card-l">逾期未收（全部）</div><div class="fin-card-n danger">NT$ ${totalOverdue.toLocaleString()}</div><div class="fin-card-s">${all.filter(p=>p.status==='overdue').length} 筆</div></div>
    <div class="fin-card"><div class="fin-card-l">${mn[m-1]}已收款</div><div class="fin-card-n good">NT$ ${monthPaid.toLocaleString()}</div><div class="fin-card-s">${monthPays.filter(p=>p.status==='paid').length} 筆</div></div>
    <div class="fin-card"><div class="fin-card-l">${mn[m-1]}請款總額</div><div class="fin-card-n">NT$ ${monthTotal.toLocaleString()}</div><div class="fin-card-s">${monthPays.length} 筆</div></div>`;
  const tbody=document.getElementById('fin-tbody');
  if(!shown.length){tbody.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--text3);padding:24px">無符合記錄</td></tr>';return;}
  tbody.innerHTML=shown.map(py=>{
    const inv=py.invoice;
    return`<tr>
      <td>${py.cname}</td>
      <td style="color:var(--text2)">${py.pname}</td>
      <td>${py.name}</td>
      <td style="font-weight:500">${fm(py.amount)}</td>
      <td style="color:var(--text2)">${py.date||'—'}</td>
      <td style="color:${py.status==='overdue'?'var(--red-text)':'var(--text2)'}">${py.due||'—'}</td>
      <td><select class="status-select" onchange="updatePayStatusFin(${py.cid},${py.pid},${py.id},this.value)">
        <option value="unpaid"${py.status==='unpaid'?' selected':''}>未付款</option>
        <option value="paid"${py.status==='paid'?' selected':''}>已收款</option>
        <option value="overdue"${py.status==='overdue'?' selected':''}>逾期</option>
      </select></td>
      <td>${inv?`<span class="badge b-invoiced" style="font-size:10px">${inv.number}</span>`:'<span style="color:var(--text3);font-size:11px">未開立</span>'}</td>
      <td></td>
    </tr>`;
  }).join('');
}

function setFinFilter(el){finF=el.dataset.fp;document.querySelectorAll('[data-fp]').forEach(p=>p.classList.remove('on'));el.classList.add('on');renderFinance()}
function setStatusFilter(el){statusF=el.dataset.fs;document.querySelectorAll('[data-fs]').forEach(p=>p.classList.remove('on'));el.classList.add('on');renderFinance()}
function updatePayStatusFin(cid,pid,pyid,val){updatePayStatus(cid,pid,pyid,val);renderFinance();}

/* Client CRUD */
function openClientModal(){editCid=null;document.getElementById('cm-title').textContent='新增客戶';['cm-name','cm-taxid','cm-phone','cm-addr','cm-budget','cm-quote','cm-contact','cm-email','cm-note'].forEach(id=>g(id).value='');g('cm-ov').classList.add('open')}
function openEditC(id){
  const c=D.clients.find(x=>x.id===id);if(!c)return;editCid=id;
  document.getElementById('cm-title').textContent='編輯客戶資料';
  g('cm-name').value=c.name||'';g('cm-taxid').value=c.taxid||'';g('cm-phone').value=c.phone||'';g('cm-addr').value=c.addr||'';g('cm-budget').value=c.budget||'';g('cm-quote').value=c.quote||'';g('cm-contact').value=c.contact||'';g('cm-email').value=c.email||'';g('cm-note').value=c.note||'';
  g('cm-ov').classList.add('open');
}
function saveClient(){
  const name=v('cm-name');if(!name){alert('請輸入公司名稱');return;}
  const d={name,taxid:v('cm-taxid'),phone:v('cm-phone'),addr:v('cm-addr'),budget:v('cm-budget'),quote:v('cm-quote'),contact:v('cm-contact'),email:v('cm-email'),note:v('cm-note')};
  if(editCid){const i=D.clients.findIndex(c=>c.id===editCid);if(i>-1)D.clients[i]={...D.clients[i],...d};toast('已更新');}
  else{D.clients.push({id:nxt(D.clients),projects:[],...d});toast('已新增客戶');}
  save();cm('cm-ov');renderCRM();
}
function delC(id){if(!confirm('確定刪除此客戶及所有資料？'))return;D.clients=D.clients.filter(c=>c.id!==id);if(openCid===id)openCid=null;save();renderCRM();toast('已刪除');}

  const c=D.clients.find(x=>x.id===cid);if(!c)return;const p=c.projects.find(x=>x.id===pid);if(!p)return;
  editPcid=cid;editPid=pid;addPcid=null;document.getElementById('pm-title').textContent='編輯專案';
  g('pm-name').value=p.name||'';g('pm-status').value=p.status||'proposal';g('pm-owner').value=p.owner||'';g('pm-amount').value=p.amount||'';g('pm-quote').value=p.quote||'';g('pm-start').value=p.start||'';g('pm-end').value=p.end||'';g('pm-drive').value=p.drive||'';g('pm-note').value=p.note||'';
  g('pm-ov').classList.add('open');
}
function saveProject(){
  const name=v('pm-name');if(!name){alert('請輸入專案名稱');return;}
  const d={name,status:g('pm-status').value,owner:v('pm-owner'),amount:v('pm-amount'),quote:v('pm-quote'),start:v('pm-start'),end:v('pm-end'),drive:v('pm-drive'),note:v('pm-note')};
  if(editPid){const c=D.clients.find(x=>x.id===editPcid);const i=c.projects.findIndex(p=>p.id===editPid);if(i>-1)c.projects[i]={...c.projects[i],...d};toast('已更新專案');}
  else{const c=D.clients.find(x=>x.id===addPcid);c.projects.push({id:nxt(c.projects),payments:[],...d});toast('已新增專案');}
  save();cm('pm-ov');renderCRM();
}
function delP(cid,pid){if(!confirm('確定刪除此專案？'))return;const c=D.clients.find(x=>x.id===cid);c.projects=c.projects.filter(p=>p.id!==pid);save();renderCRM();toast('已刪除');}

/* Payment CRUD */
function openAddPay(cid,pid){
  addPayCid=cid;addPayPid=pid;editPayId=null;editPayPid=null;editPayCid=null;
  document.getElementById('pay-title').textContent='新增請款記錄';
  ['pay-name','pay-amount','pay-date','pay-due','pay-note','inv-number','inv-date','inv-amount'].forEach(id=>g(id).value='');
  g('pay-status').value='unpaid';g('inv-type').value='';
  g('pay-ov').classList.add('open');
}
function openEditPay(cid,pid,pyid){
  const c=D.clients.find(x=>x.id===cid);if(!c)return;
  const p=c.projects.find(x=>x.id===pid);if(!p)return;
  const py=p.payments.find(x=>x.id===pyid);if(!py)return;
  editPayCid=cid;editPayPid=pid;editPayId=pyid;addPayCid=null;addPayPid=null;
  document.getElementById('pay-title').textContent='編輯請款記錄';
  g('pay-name').value=py.name||'';g('pay-amount').value=py.amount||'';g('pay-status').value=py.status||'unpaid';g('pay-date').value=py.date||'';g('pay-due').value=py.due||'';g('pay-note').value=py.note||'';
  const inv=py.invoice||{};
  g('inv-number').value=inv.number||'';g('inv-type').value=inv.type||'';g('inv-date').value=inv.date||'';g('inv-amount').value=inv.amount||'';
  g('pay-ov').classList.add('open');
}
function savePayment(){
  const name=v('pay-name');if(!name){alert('請輸入請款項目名稱');return;}
  const amt=v('pay-amount');if(!amt){alert('請輸入請款金額');return;}
  const invNum=v('inv-number');const invType=g('inv-type').value;
  const invoice=(invNum||invType)?{number:invNum,type:invType,date:v('inv-date'),amount:v('inv-amount')}:null;
  const d={name,amount:amt,status:g('pay-status').value,date:v('pay-date'),due:v('pay-due'),note:v('pay-note'),invoice};
  if(editPayId){
    const c=D.clients.find(x=>x.id===editPayCid);const p=c.projects.find(x=>x.id===editPayPid);
    const i=p.payments.findIndex(py=>py.id===editPayId);if(i>-1)p.payments[i]={...p.payments[i],...d};toast('已更新');
  }else{
    const c=D.clients.find(x=>x.id===addPayCid);const p=c.projects.find(x=>x.id===addPayPid);
    p.payments.push({id:nxt(p.payments),...d});toast('已新增請款記錄');
  }
  save();cm('pay-ov');renderCRM();
}
function delPay(cid,pid,pyid){if(!confirm('確定刪除此請款記錄？'))return;const c=D.clients.find(x=>x.id===cid);const p=c.projects.find(x=>x.id===pid);p.payments=p.payments.filter(py=>py.id!==pyid);save();renderCRM();toast('已刪除');}

function v(id){return g(id).value.trim()}
function g(id){return document.getElementById(id)}
function cm(id){g(id).classList.remove('open')}
function oc(e,id){if(e.target===g(id))cm(id)}
function toast(msg){const el=g('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}

load();renderCRM();
</script>
