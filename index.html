<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>客戶管理系統</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f6f3;--bg3:#f0efe9;
  --text:#1a1a18;--text2:#6b6a64;--text3:#9b9a94;
  --border:#e0ddd4;--border2:#c8c6bc;
  --teal:#0f6e56;--teal-bg:#e1f5ee;--teal-text:#085041;
  --blue-bg:#e6f1fb;--blue-text:#0c447c;
  --amber-bg:#faeeda;--amber-text:#633806;
  --gray-bg:#f1efe8;--gray-text:#444441;
  --purple-bg:#eeedfe;--purple-text:#3c3489;
  --red-bg:#fcebeb;--red-text:#791f1f;
  --r:8px;--rl:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1c1c1a;--bg2:#252523;--bg3:#2e2e2b;
    --text:#e8e6df;--text2:#9b9a94;--text3:#6b6a64;
    --border:#3a3935;--border2:#4a4943;
    --teal:#1d9e75;--teal-bg:#085041;--teal-text:#9fe1cb;
    --blue-bg:#0c447c;--blue-text:#b5d4f4;
    --amber-bg:#633806;--amber-text:#fac775;
    --gray-bg:#3a3935;--gray-text:#d3d1c7;
    --purple-bg:#3c3489;--purple-text:#cecbf6;
    --red-bg:#501313;--red-text:#f7c1c1;
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg3);color:var(--text);min-height:100vh;font-size:14px;line-height:1.6}
.app{max-width:900px;margin:0 auto;padding:24px 16px}
header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:10px}
.logo{font-size:18px;font-weight:600}.logo span{color:var(--teal)}
.saved{font-size:12px;color:var(--text3)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:22px}
.stat{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--r);padding:14px 16px}
.stat-l{font-size:12px;color:var(--text2);margin-bottom:3px}
.stat-n{font-size:24px;font-weight:600}
.toolbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.sw{flex:1;min-width:200px;position:relative}
.sw svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none}
.sw input{width:100%;padding:9px 12px 9px 34px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg);color:var(--text);font-size:14px;outline:none}
.sw input:focus{border-color:var(--teal)}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.pill{padding:6px 13px;border-radius:20px;border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);font-size:13px;cursor:pointer;transition:.15s}
.pill:hover{background:var(--bg2)}
.pill.on{background:var(--teal-bg);border-color:var(--teal);color:var(--teal-text);font-weight:500}
.btn-add{padding:9px 18px;border-radius:var(--r);border:0.5px solid var(--teal);background:var(--teal-bg);color:var(--teal-text);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-add:hover{opacity:.85}
.clients{display:flex;flex-direction:column;gap:10px}
.cc{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--rl);overflow:hidden;transition:border-color .15s}
.cc:hover{border-color:var(--border2)}
.cc.open{border-color:var(--teal);border-width:1px}
.cc-header{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer}
.av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.ci{flex:1;min-width:0}
.cn{font-size:15px;font-weight:500}
.cm{font-size:12px;color:var(--text2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cc-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.proj-count{font-size:12px;color:var(--text3);background:var(--bg2);padding:3px 9px;border-radius:12px;border:0.5px solid var(--border)}
.chevron{width:16px;height:16px;opacity:.4;transition:transform .2s;flex-shrink:0}
.cc.open .chevron{transform:rotate(180deg)}
.cc-detail{display:none;border-top:0.5px solid var(--border);padding:16px}
.cc.open .cc-detail{display:block}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px 20px;margin-bottom:16px}
.dl{font-size:11px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.dv{font-size:13px;font-weight:500;word-break:break-all}
.cc-actions{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.btn-sm{padding:6px 12px;border-radius:var(--r);border:0.5px solid var(--border2);background:var(--bg);color:var(--text2);font-size:12px;cursor:pointer;transition:.15s}
.btn-sm:hover{background:var(--bg2)}
.btn-del{color:var(--red-text);border-color:#f0abab}
.btn-del:hover{background:var(--red-bg)}
.proj-section{}
.proj-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.proj-title{font-size:13px;font-weight:500;color:var(--text2)}
.btn-add-proj{padding:5px 12px;border-radius:var(--r);border:0.5px solid var(--teal);background:var(--teal-bg);color:var(--teal-text);font-size:12px;cursor:pointer}
.proj-list{display:flex;flex-direction:column;gap:8px}
.proj-empty{font-size:13px;color:var(--text3);padding:12px 0;text-align:center}
.pc{background:var(--bg2);border:0.5px solid var(--border);border-radius:var(--r);padding:13px 15px}
.pc-row{display:flex;align-items:center;gap:10px;cursor:pointer}
.pc-info{flex:1;min-width:0}
.pn{font-size:13px;font-weight:500}
.pm{font-size:12px;color:var(--text2);margin-top:2px}
.badge{font-size:11px;padding:3px 9px;border-radius:12px;white-space:nowrap;flex-shrink:0}
.b-proposal{background:var(--blue-bg);color:var(--blue-text)}
.b-active{background:var(--teal-bg);color:var(--teal-text)}
.b-closed{background:var(--gray-bg);color:var(--gray-text)}
.pc-expand{display:none;margin-top:12px;padding-top:12px;border-top:0.5px solid var(--border)}
.pc-expand.open{display:block}
.pc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px 16px;margin-bottom:12px}
.pc-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.drive-link{font-size:12px;color:var(--teal);text-decoration:none;word-break:break-all}
.drive-link:hover{text-decoration:underline}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:var(--rl);border:0.5px solid var(--border2);padding:24px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:16px;font-weight:600;margin-bottom:18px}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px}
.fg input,.fg select,.fg textarea{width:100%;padding:9px 11px;border:0.5px solid var(--border2);border-radius:var(--r);background:var(--bg2);color:var(--text);font-size:13px;font-family:inherit;outline:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--teal)}
.fg-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-btns{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.btn-cancel{padding:9px 18px;border-radius:var(--r);border:0.5px solid var(--border2);background:transparent;color:var(--text2);font-size:13px;cursor:pointer}
.btn-save{padding:9px 18px;border-radius:var(--r);border:0.5px solid var(--teal);background:var(--teal-bg);color:var(--teal-text);font-size:13px;font-weight:500;cursor:pointer}
.btn-save:hover{opacity:.85}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:var(--r);font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
@media(max-width:520px){.fg-row{grid-template-columns:1fr}.detail-grid{grid-template-columns:1fr 1fr}.pc-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">客戶管理 <span>CRM</span></div>
    <div class="saved" id="saved">資料儲存於本機瀏覽器</div>
  </header>
  <div class="stats" id="stats"></div>
  <div class="toolbar">
    <div class="sw">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M10 10l3 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      <input type="text" id="search" placeholder="搜尋公司名稱、統編、電話…" oninput="render()">
    </div>
    <div class="filters">
      <button class="pill on" data-f="all" onclick="setFilter(this)">全部</button>
      <button class="pill" data-f="active" onclick="setFilter(this)">進行中專案</button>
      <button class="pill" data-f="proposal" onclick="setFilter(this)">提案中</button>
    </div>
    <button class="btn-add" onclick="openClientModal()">+ 新增客戶</button>
  </div>
  <div class="clients" id="clients"></div>
</div>

<div class="overlay" id="cm-overlay" onclick="overlayClick(event,'cm-overlay')">
  <div class="modal">
    <h2 id="cm-title">新增客戶</h2>
    <div class="fg"><label>公司名稱 *</label><input id="cm-name" placeholder="例：台北數位科技有限公司"></div>
    <div class="fg-row">
      <div class="fg"><label>統一編號</label><input id="cm-taxid" placeholder="12345678"></div>
      <div class="fg"><label>電話</label><input id="cm-phone" placeholder="02-xxxx-xxxx"></div>
    </div>
    <div class="fg"><label>地址</label><input id="cm-addr" placeholder="台北市信義區…"></div>
    <div class="fg-row">
      <div class="fg"><label>預算規模（NT$）</label><input id="cm-budget" placeholder="例：500,000"></div>
      <div class="fg"><label>報價單編號</label><input id="cm-quote" placeholder="例：Q2025-001"></div>
    </div>
    <div class="fg"><label>聯絡人</label><input id="cm-contact" placeholder="姓名・職稱"></div>
    <div class="fg"><label>Email</label><input id="cm-email" type="email" placeholder="contact@company.com"></div>
    <div class="fg"><label>備註</label><textarea id="cm-note" rows="2" placeholder="來源、特殊需求…"></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('cm-overlay')">取消</button>
      <button class="btn-save" onclick="saveClient()">儲存</button>
    </div>
  </div>
</div>

<div class="overlay" id="pm-overlay" onclick="overlayClick(event,'pm-overlay')">
  <div class="modal">
    <h2 id="pm-title">新增專案</h2>
    <div class="fg"><label>專案名稱 *</label><input id="pm-name" placeholder="例：2025 品牌社群年約"></div>
    <div class="fg-row">
      <div class="fg"><label>狀態</label>
        <select id="pm-status">
          <option value="proposal">提案中</option>
          <option value="active">進行中</option>
          <option value="closed">結案</option>
        </select>
      </div>
      <div class="fg"><label>負責人員</label><input id="pm-owner" placeholder="同仁姓名"></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>合約金額（NT$）</label><input id="pm-amount" placeholder="例：120,000"></div>
      <div class="fg"><label>報價單編號</label><input id="pm-quote" placeholder="例：Q2025-002"></div>
    </div>
    <div class="fg-row">
      <div class="fg"><label>開始日期</label><input id="pm-start" type="date"></div>
      <div class="fg"><label>結束日期</label><input id="pm-end" type="date"></div>
    </div>
    <div class="fg"><label>Google Drive 連結</label><input id="pm-drive" placeholder="https://drive.google.com/…"></div>
    <div class="fg"><label>備註</label><textarea id="pm-note" rows="2" placeholder="專案說明、重要記錄…"></textarea></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('pm-overlay')">取消</button>
      <button class="btn-save" onclick="saveProject()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS=[
  {bg:'#e1f5ee',c:'#085041'},{bg:'#e6f1fb',c:'#0c447c'},
  {bg:'#faeeda',c:'#633806'},{bg:'#eeedfe',c:'#3c3489'},
  {bg:'#faece7',c:'#712b13'},{bg:'#eaf3de',c:'#27500a'},
];
const SL={proposal:'提案中',active:'進行中',closed:'結案'};
const SC={proposal:'b-proposal',active:'b-active',closed:'b-closed'};

let data={clients:[]};
let filter='all';
let openClientId=null;
let openProjIds={};
let editClientId=null;
let editProjId=null;
let editProjClientId=null;
let addProjClientId=null;

function load(){
  try{data=JSON.parse(localStorage.getItem('crm_v2')||'null')||{clients:[]};}catch{data={clients:[]};}
  if(!data.clients.length){
    data={clients:[
      {id:1,name:'好感電商股份有限公司',taxid:'12345678',phone:'02-2345-6789',addr:'台北市信義區松高路1號',budget:'500,000',quote:'Q2025-001',contact:'陳小明・行銷總監',email:'chen@goodsense.tw',note:'長期合作客戶',projects:[
        {id:101,name:'2025 Google 廣告年約',status:'active',owner:'王小華',amount:'240,000',quote:'Q2025-001A',start:'2025-01-01',end:'2025-12-31',drive:'',note:'每月固定投放預算 20,000'},
        {id:102,name:'品牌網站改版',status:'proposal',owner:'李設計',amount:'80,000',quote:'Q2025-001B',start:'',end:'',drive:'',note:'預計 Q2 執行'},
      ]},
      {id:2,name:'旭日餐飲集團',taxid:'87654321',phone:'02-8765-4321',addr:'台北市大安區忠孝東路四段200號',budget:'300,000',quote:'Q2025-002',contact:'林美華・品牌經理',email:'lin@sunrise-food.com',note:'',projects:[
        {id:201,name:'2025 Q3 社群行銷',status:'proposal',owner:'陳企劃',amount:'90,000',quote:'Q2025-002A',start:'2025-07-01',end:'2025-09-30',drive:'',note:'下週簡報確認'},
      ]},
      {id:3,name:'健康樂活品牌',taxid:'11223344',phone:'0912-345-678',addr:'新北市板橋區文化路一段100號',budget:'800,000',quote:'Q2024-015',contact:'張大偉・執行長',email:'chang@healthjoy.tw',note:'年度合約',projects:[
        {id:301,name:'KOL 合作專案',status:'active',owner:'王小華',amount:'200,000',quote:'Q2024-015A',start:'2024-07-01',end:'2025-06-30',drive:'https://drive.google.com',note:'合作 KOL 共 5 位'},
        {id:302,name:'Meta 廣告投放',status:'closed',owner:'李媒購',amount:'360,000',quote:'Q2024-015B',start:'2024-01-01',end:'2024-12-31',drive:'',note:'已結案'},
        {id:303,name:'2025 廣告年約',status:'active',owner:'李媒購',amount:'360,000',quote:'Q2025-015A',start:'2025-01-01',end:'2025-12-31',drive:'',note:''},
      ]},
    ]};
    save();
  }
}

function save(){
  localStorage.setItem('crm_v2',JSON.stringify(data));
  const now=new Date();
  document.getElementById('saved').textContent='上次儲存：'+now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
}

function nextClientId(){return data.clients.length?Math.max(...data.clients.map(c=>c.id))+1:1}
function nextProjId(client){return client.projects.length?Math.max(...client.projects.map(p=>p.id))+1:1}
function initials(name){const p=name.trim().split(/\s+/);return p.length>=2?p[0][0]+p[1][0]:name.slice(0,2)}
function col(id){return COLORS[id%COLORS.length]}

function renderStats(){
  const total=data.clients.length;
  const allProjs=data.clients.flatMap(c=>c.projects);
  const active=allProjs.filter(p=>p.status==='active').length;
  const proposal=allProjs.filter(p=>p.status==='proposal').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-l">客戶總數</div><div class="stat-n">${total}</div></div>
    <div class="stat"><div class="stat-l">專案總數</div><div class="stat-n">${allProjs.length}</div></div>
    <div class="stat"><div class="stat-l">進行中</div><div class="stat-n">${active}</div></div>
    <div class="stat"><div class="stat-l">提案中</div><div class="stat-n">${proposal}</div></div>
  `;
}

function render(){
  renderStats();
  const q=document.getElementById('search').value.toLowerCase();
  const clients=data.clients.filter(c=>{
    const mq=!q||[c.name,c.taxid,c.phone,c.contact,c.email].join(' ').toLowerCase().includes(q);
    const mf=filter==='all'||(filter==='active'&&c.projects.some(p=>p.status==='active'))||(filter==='proposal'&&c.projects.some(p=>p.status==='proposal'));
    return mq&&mf;
  });
  const el=document.getElementById('clients');
  if(!clients.length){el.innerHTML='<div class="empty-state">找不到符合的客戶</div>';return;}
  el.innerHTML=clients.map(c=>{
    const cl=col(c.id);
    const isOpen=openClientId===c.id;
    const activeCount=c.projects.filter(p=>p.status==='active').length;
    return`<div class="cc${isOpen?' open':''}" id="cc-${c.id}">
      <div class="cc-header" onclick="toggleClient(${c.id})">
        <div class="av" style="background:${cl.bg};color:${cl.c}">${initials(c.name)}</div>
        <div class="ci">
          <div class="cn">${c.name}</div>
          <div class="cm">${c.taxid?'統編 '+c.taxid+'・':''}${c.phone||''}${c.contact?'・'+c.contact:''}</div>
        </div>
        <div class="cc-right">
          <span class="proj-count">${c.projects.length} 個專案${activeCount?' · '+activeCount+' 進行中':''}</span>
          <svg class="chevron" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
      </div>
      <div class="cc-detail">
        <div class="detail-grid">
          <div><div class="dl">統一編號</div><div class="dv">${c.taxid||'—'}</div></div>
          <div><div class="dl">電話</div><div class="dv">${c.phone||'—'}</div></div>
          <div><div class="dl">地址</div><div class="dv">${c.addr||'—'}</div></div>
          <div><div class="dl">聯絡人</div><div class="dv">${c.contact||'—'}</div></div>
          <div><div class="dl">Email</div><div class="dv">${c.email||'—'}</div></div>
          <div><div class="dl">預算規模</div><div class="dv">${c.budget?'NT$ '+c.budget:'—'}</div></div>
          <div><div class="dl">報價單編號</div><div class="dv">${c.quote||'—'}</div></div>
          <div><div class="dl">備註</div><div class="dv">${c.note||'—'}</div></div>
        </div>
        <div class="cc-actions">
          <button class="btn-sm" onclick="openEditClient(${c.id})">編輯客戶資料</button>
          <button class="btn-sm btn-del" onclick="delClient(${c.id})">刪除客戶</button>
        </div>
        <div class="proj-section">
          <div class="proj-header">
            <span class="proj-title">專案 / 合約（${c.projects.length}）</span>
            <button class="btn-add-proj" onclick="openAddProj(${c.id})">+ 新增專案</button>
          </div>
          <div class="proj-list">${c.projects.length?c.projects.map(p=>renderProj(c.id,p)).join(''):'<div class="proj-empty">尚無專案，點上方按鈕新增</div>'}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderProj(cid,p){
  const isOpen=openProjIds[cid+'_'+p.id];
  return`<div class="pc">
    <div class="pc-row" onclick="toggleProj(${cid},${p.id})">
      <div class="pc-info">
        <div class="pn">${p.name}</div>
        <div class="pm">${p.owner?p.owner+'・':''}${p.amount?'NT$ '+p.amount:''}${p.start?'・'+p.start.slice(0,7):''}</div>
      </div>
      <span class="badge ${SC[p.status]}">${SL[p.status]}</span>
      <svg style="width:14px;height:14px;opacity:.35;transition:transform .2s;${isOpen?'transform:rotate(180deg)':''}flex-shrink:0" viewBox="0 0 16 16" fill="none"><path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="pc-expand${isOpen?' open':''}">
      <div class="pc-grid">
        <div><div class="dl">負責人員</div><div class="dv">${p.owner||'—'}</div></div>
        <div><div class="dl">合約金額</div><div class="dv">${p.amount?'NT$ '+p.amount:'—'}</div></div>
        <div><div class="dl">報價單編號</div><div class="dv">${p.quote||'—'}</div></div>
        <div><div class="dl">開始日期</div><div class="dv">${p.start||'—'}</div></div>
        <div><div class="dl">結束日期</div><div class="dv">${p.end||'—'}</div></div>
        <div><div class="dl">狀態</div><div class="dv">${SL[p.status]}</div></div>
      </div>
      ${p.drive?`<div style="margin-bottom:10px"><div class="dl" style="margin-bottom:3px">Google Drive</div><a class="drive-link" href="${p.drive}" target="_blank">${p.drive}</a></div>`:''}
      ${p.note?`<div style="margin-bottom:10px"><div class="dl" style="margin-bottom:3px">備註</div><div class="dv" style="font-weight:400;font-size:13px">${p.note}</div></div>`:''}
      <div class="pc-actions">
        <button class="btn-sm" onclick="openEditProj(${cid},${p.id})">編輯專案</button>
        <button class="btn-sm btn-del" onclick="delProj(${cid},${p.id})">刪除專案</button>
      </div>
    </div>
  </div>`;
}

function toggleClient(id){openClientId=openClientId===id?null:id;render()}
function toggleProj(cid,pid){const k=cid+'_'+pid;openProjIds[k]=!openProjIds[k];render()}
function setFilter(el){filter=el.dataset.f;document.querySelectorAll('.pill').forEach(p=>p.classList.remove('on'));el.classList.add('on');render()}

function openClientModal(){
  editClientId=null;
  document.getElementById('cm-title').textContent='新增客戶';
  ['cm-name','cm-taxid','cm-phone','cm-addr','cm-budget','cm-quote','cm-contact','cm-email','cm-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('cm-overlay').classList.add('open');
}
function openEditClient(id){
  const c=data.clients.find(x=>x.id===id);if(!c)return;
  editClientId=id;
  document.getElementById('cm-title').textContent='編輯客戶資料';
  document.getElementById('cm-name').value=c.name||'';
  document.getElementById('cm-taxid').value=c.taxid||'';
  document.getElementById('cm-phone').value=c.phone||'';
  document.getElementById('cm-addr').value=c.addr||'';
  document.getElementById('cm-budget').value=c.budget||'';
  document.getElementById('cm-quote').value=c.quote||'';
  document.getElementById('cm-contact').value=c.contact||'';
  document.getElementById('cm-email').value=c.email||'';
  document.getElementById('cm-note').value=c.note||'';
  document.getElementById('cm-overlay').classList.add('open');
}
function saveClient(){
  const name=document.getElementById('cm-name').value.trim();
  if(!name){alert('請輸入公司名稱');return;}
  const d={name,taxid:v('cm-taxid'),phone:v('cm-phone'),addr:v('cm-addr'),budget:v('cm-budget'),quote:v('cm-quote'),contact:v('cm-contact'),email:v('cm-email'),note:v('cm-note')};
  if(editClientId){
    const idx=data.clients.findIndex(c=>c.id===editClientId);
    if(idx>-1)data.clients[idx]={...data.clients[idx],...d};
    toast('已更新客戶資料');
  }else{
    data.clients.push({id:nextClientId(),projects:[],...d});
    toast('已新增客戶');
  }
  save();closeModal('cm-overlay');render();
}
function delClient(id){
  if(!confirm('確定刪除此客戶及其所有專案？'))return;
  data.clients=data.clients.filter(c=>c.id!==id);
  if(openClientId===id)openClientId=null;
  save();render();toast('已刪除');
}
function openAddProj(cid){
  addProjClientId=cid;editProjId=null;editProjClientId=null;
  document.getElementById('pm-title').textContent='新增專案';
  ['pm-name','pm-owner','pm-amount','pm-quote','pm-start','pm-end','pm-drive','pm-note'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('pm-status').value='proposal';
  document.getElementById('pm-overlay').classList.add('open');
}
function openEditProj(cid,pid){
  const c=data.clients.find(x=>x.id===cid);if(!c)return;
  const p=c.projects.find(x=>x.id===pid);if(!p)return;
  editProjClientId=cid;editProjId=pid;addProjClientId=null;
  document.getElementById('pm-title').textContent='編輯專案';
  document.getElementById('pm-name').value=p.name||'';
  document.getElementById('pm-status').value=p.status||'proposal';
  document.getElementById('pm-owner').value=p.owner||'';
  document.getElementById('pm-amount').value=p.amount||'';
  document.getElementById('pm-quote').value=p.quote||'';
  document.getElementById('pm-start').value=p.start||'';
  document.getElementById('pm-end').value=p.end||'';
  document.getElementById('pm-drive').value=p.drive||'';
  document.getElementById('pm-note').value=p.note||'';
  document.getElementById('pm-overlay').classList.add('open');
}
function saveProject(){
  const name=document.getElementById('pm-name').value.trim();
  if(!name){alert('請輸入專案名稱');return;}
  const d={name,status:document.getElementById('pm-status').value,owner:v('pm-owner'),amount:v('pm-amount'),quote:v('pm-quote'),start:v('pm-start'),end:v('pm-end'),drive:v('pm-drive'),note:v('pm-note')};
  if(editProjId){
    const c=data.clients.find(x=>x.id===editProjClientId);
    const idx=c.projects.findIndex(p=>p.id===editProjId);
    if(idx>-1)c.projects[idx]={...c.projects[idx],...d};
    toast('已更新專案');
  }else{
    const c=data.clients.find(x=>x.id===addProjClientId);
    c.projects.push({id:nextProjId(c),...d});
    toast('已新增專案');
  }
  save();closeModal('pm-overlay');render();
}
function delProj(cid,pid){
  if(!confirm('確定刪除此專案？'))return;
  const c=data.clients.find(x=>x.id===cid);
  c.projects=c.projects.filter(p=>p.id!==pid);
  save();render();toast('已刪除');
}
function v(id){return document.getElementById(id).value.trim()}
function closeModal(id){document.getElementById(id).classList.remove('open')}
function overlayClick(e,id){if(e.target===document.getElementById(id))closeModal(id)}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200)}

load();render();
</script>
</body>
</html>
